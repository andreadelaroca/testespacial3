<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Test de Inteligencia Espacial</title>

    <link rel="stylesheet" href="css/registro.css">
</head>

<body>

<div class="registro-container">

    <div class="panel-info">

        <div class="circulo"></div>
        <div class="cuadro"></div>
        <div class="cuadro2"></div>

        <h1>TEST DE INTELIGENCIA ESPACIAL</h1>

        <p>
            Crea tu cuenta para realizar la evaluación.
        </p>

    </div>

    <div class="panel-formulario">

        <h2>REGISTRO</h2>

        <form
                id="registroForm"
                class="form-grid"
                action="/testespacial3/registro"
                method="post">

            <div class="campo">
                <label for="nombres">Nombres</label>
                <input
                        type="text"
                        id="nombres"
                        name="nombres"
                        placeholder="Ingrese sus nombres"
                        required>
            </div>

            <div class="campo">
                <label for="apellidos">Apellidos</label>
                <input
                        type="text"
                        id="apellidos"
                        name="apellidos"
                        placeholder="Ingrese sus apellidos"
                        required>
            </div>

            <div class="campo">
                <label for="email">Correo Electrónico</label>
                <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="correo@ejemplo.com"
                        required>
            </div>

            <div class="campo">
                <label for="username">Nombre de Usuario</label>
                <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Usuario"
                        required>
            </div>

            <div class="campo">
                <label for="fechaNac">Fecha de Nacimiento</label>
                <input
                        type="date"
                        id="fechaNac"
                        name="fechaNac"
                        required>
            </div>

            <div class="campo">
                <label for="sexo">Sexo</label>
                <select
                        id="sexo"
                        name="sexo"
                        required>

                    <option value="">Seleccione</option>
                    <option value="F">F</option>
                    <option value="M">M</option>

                </select>
            </div>

            <div class="campo">
                <label for="profesion">Profesión</label>
                <input
                        type="text"
                        id="profesion"
                        name="profesion"
                        placeholder="Profesión"
                        required>
            </div>

            <div class="campo">
                <label for="estudios">Nivel de Estudios</label>
                <select
                        id="estudios"
                        name="estudios"
                        required>

                    <option value="">Seleccione</option>
                    <option value="Primaria">Primaria</option>
                    <option value="Secundaria">Secundaria</option>
                    <option value="Tecnico">Técnico</option>
                    <option value="Universitario">Universitario</option>
                    <option value="Postgrado">Posgrado</option>

                </select>
            </div>

            <div class="campo">
                <label for="password">Contraseña</label>
                <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Contraseña"
                        minlength="8"
                        required>
            </div>

            <div class="campo">
                <label for="confirmPassword">
                    Confirmar Contraseña
                </label>
                <input
                        type="password"
                        id="confirmPassword"
                        name="confirmPassword"
                        placeholder="Confirmar Contraseña"
                        minlength="8"
                        required>
            </div>

            <div class="boton-container">

                <button
                        type="submit"
                        class="btn-registro">

                    Registrarse

                </button>

            </div>

        </form>

    </div>
    <script>

        document.getElementById("registroForm")
        .addEventListener("submit", function(e){

            const password =
                document.getElementById("password").value;

            const confirmPassword =
                document.getElementById("confirmPassword").value;

            const sexo =
                document.getElementById("sexo").value;

            if(password !== confirmPassword){

                e.preventDefault();

                alert("Las contraseñas no coinciden");
                return;
            }

            if(sexo !== "F" && sexo !== "M"){

                e.preventDefault();

                alert("El sexo solo puede ser F o M");
            }

        });

    </script>

</div>
<script src="js/registro.js"></script>
</body>

</html>
